services:
  - type: web
    name: fieldforce-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://fieldforce-frontend.vercel.app
      - key: DB_DIALECT
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: fieldforce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fieldforce-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: fieldforce-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: fieldforce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fieldforce-db
          property: password

databases:
  - name: fieldforce-db
    databaseName: fieldforce
    user: fieldforce
