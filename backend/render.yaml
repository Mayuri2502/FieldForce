services:
  - type: web
    name: fieldforce-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://fieldforce-frontend.vercel.app
    disk:
      name: data
      mountPath: /opt/render/project
      sizeGB: 1
